{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Tattoo App{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Подключение дополнительных стилей для отдельных страниц -->
    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Модальное окно для уведомлений -->
    <div id="notificationModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <p id="notificationMessage"></p>
        </div>
    </div>
    
    <!-- Основной контент -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Добавляем стили для модального окна -->
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 50%;
            text-align: center;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>

    {% if messages %}
<div id="messagesContainer" data-messages="{% for message in messages %}{{ message|escapejs }}|{% endfor %}"></div>

<script>
    window.onload = function() {
        var notificationModal = document.getElementById("notificationModal");
        var messageElement = document.getElementById("notificationMessage");
        var messagesContainer = document.getElementById("messagesContainer");

        if (notificationModal && messageElement && messagesContainer) {
            var messagesData = messagesContainer.getAttribute("data-messages");
            var messages = messagesData.split("|").filter(msg => msg.trim() !== ""); // Убираем пустые строки

            if (messages.length > 0) {
                messageElement.innerHTML = messages.join("<br>");
                notificationModal.style.display = "block";
            }
        }
    };

    function closeModal() {
        var modal = document.getElementById("notificationModal");
        if (modal) {
            modal.style.display = "none";
        }
    }
</script>
{% endif %}

    <!-- Подключение дополнительных скриптов для отдельных страниц -->
    {% block extra_js %}
        <script src="{% static 'js/verification.js' %}"></script>
    {% endblock %}

</body>
</html>
