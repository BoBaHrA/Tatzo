{% extends "base.html" %}
{% load static %}

{% block title %}Новый пароль — Tatzo{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/password_reset.css' %}">

<div class="reset-container">
    <div class="logo">Tatzo</div>
    <h2>Сброс пароля</h2>
    <p class="instructions">Придумайте новый пароль для вашего аккаунта.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Сохранить</button>
    </form>
</div>
{% endblock %}
