{% extends 'base.html' %}

{% block title %}Upload Verification Documents{% endblock %}

{% block content %}
<div class="container">
    <h2>Upload Verification Documents</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="input-group">
            <label for="document_type">Document Type</label>
            <select name="document_type" id="document_type" required>
                <option value="certificate">Certificate of Qualification</option>
                <option value="license">License</option>
                <option value="registration">Registration Document</option>
            </select>
        </div>

        <div class="input-group">
            <label for="document_file">Upload Document</label>
            <input type="file" name="document_file" id="document_file" required>
        </div>

        <div class="input-group">
            <label for="identity_document">Upload Identity Document (Optional)</label>
            <input type="file" name="identity_document" id="identity_document">
        </div>

        <button type="submit" class="btn">Submit Documents</button>
    </form>
</div>
{% endblock %}
