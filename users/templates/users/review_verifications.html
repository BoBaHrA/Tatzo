{% extends 'base.html' %}

{% block title %}Review Verifications{% endblock %}

{% block content %}
<div class="container">
    <h2>Review Verifications</h2>
    <ul>
        {% for document in documents %}
            <li>
                {{ document.user.username }} - {{ document.get_document_type_display }}
                <a href="{% url 'approve_document' document.id %}">Approve</a>
                <a href="{% url 'reject_document' document.id %}">Reject</a>
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
