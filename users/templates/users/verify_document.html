{% extends 'base.html' %}

{% block title %}Verify Document{% endblock %}

{% block content %}
<div class="container">
    <h2>Verify Document</h2>
    <p><strong>User:</strong> {{ document.user.username }}</p>
    <p><strong>Document Type:</strong> {{ document.get_document_type_display }}</p>
    <p><strong>Uploaded On:</strong> {{ document.created_at }}</p>
    <p><strong>Document:</strong></p>
    <img src="{{ document.document_file.url }}" alt="Document" width="300">
    
    <form method="post" action="{% url 'verify_document' document.id %}">
        {% csrf_token %}
        <button type="submit" name="action" value="approve">Approve</button>
        <button type="submit" name="action" value="reject">Reject</button>
    </form>
</div>
{% endblock %}
